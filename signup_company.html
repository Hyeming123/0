<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기업 회원가입 - HERMA-X</title>
  <!-- 부트스트랩 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    /* 내비게이션 바 로고 전용 스타일 (타 페이지와 완벽 통일) */
    .navbar-logo {
      max-height: 32px;
      width: auto;
      object-fit: contain;
    }

    .auth-container {
      max-width: 500px;
      margin: 50px auto;
      padding: 40px;
      background-color: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .auth-container h1 {
      text-align: center;
      color: #0d6efd;
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #495057;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .btn-signup {
      width: 100%;
      padding: 12px;
      background-color: #0d6efd;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    .btn-signup:hover {
      background-color: #0b5ed7;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .message.error {
      background-color: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
      display: block;
    }

    .message.success {
      background-color: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
      display: block;
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      color: #495057;
      font-size: 14px;
    }

    .auth-link a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <!-- 상단 내비게이션 바 (공통 메뉴 및 드롭다운 회원가입 적용) -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="index.html">
        <img src="./static/assets/logo_gold_stamped.png" alt="HERMA-X Logo" class="navbar-logo"
          onerror="this.src='https://placehold.co/40x40/0d6efd/ffffff?text=H';">
        <span>HERMA-X</span>
      </a>

      <!-- 우측 상단 버튼 세트 -->
      <div class="d-flex align-items-center ms-auto gap-2">
        <a class="btn btn-sm btn-outline-primary" href="login.html">로그인</a>

        <div class="dropdown">
          <button class="btn btn-sm btn-primary dropdown-toggle fw-bold active" type="button" data-bs-toggle="dropdown"
            aria-expanded="false">
            회원가입
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-menu-item dropdown-item" href="signup.html">개인 회원가입</a></li>
            <li><a class="dropdown-menu-item dropdown-item" href="signup_company.html">기업 회원가입</a></li>
          </ul>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">메인</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="dashboard_company.html">기업 대시보드</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Features</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <h1>기업 회원가입</h1>

    <form id="companySignupForm" onsubmit="handleCompanySignup(event)">
      <div class="form-group">
        <label for="companyName">회사명</label>
        <input type="text" id="companyName" placeholder="올바른 법인/개인회사명을 입력하세요" required>
      </div>

      <div class="form-group">
        <label for="businessNumber">사업자 등록번호</label>
        <input type="text" id="businessNumber" placeholder="000-00-00000" required>
      </div>

      <div class="form-group">
        <label for="country">기업 소재 국가</label>
        <select id="country" required>
          <option value="">-- 국가를 선택하세요 --</option>
          <option value="대한민국">대한민국 (South Korea)</option>
          <option value="미국">미국 (USA)</option>
          <option value="중국">중국 (China)</option>
          <option value="일본">일본 (Japan)</option>
          <option value="독일">독일 (Germany)</option>
          <option value="프랑스">프랑스 (France)</option>
          <option value="영국">영국 (UK)</option>
          <option value="베트남">베트남 (Vietnam)</option>
          <option value="인도네시아">인도네시아 (Indonesia)</option>
          <option value="태국">태국 (Thailand)</option>
          <option value="인도">인도 (India)</option>
          <option value="캐나다">캐나다 (Canada)</option>
          <option value="호주">호주 (Australia)</option>
          <option value="멕시코">멕시코 (Mexico)</option>
          <option value="브라질">브라질 (Brazil)</option>
          <option value="기타">기타 (Other)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">기업 이메일 (계정 ID)</label>
        <input type="email" id="email" placeholder="official@company.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="최소 6자 이상" required autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" required autocomplete="new-password">
      </div>

      <button type="submit" class="btn-signup" id="signupBtn">기업 인증 및 가입신청</button>
    </form>

    <div id="message" class="message"></div>

    <div class="auth-link">
      이미 기업 계정이 있으신가요? <a href="login.html">로그인</a>
    </div>
  </div>

  <!-- 발표 시연용 계정 퀵 스위처 위젯 -->
  <div id="demoSwitcherContainer"></div>

  <!-- 부트스트랩 JS 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 공통 테마 디자인용 스타일 파일 추가 -->
  <link href="./static/css/custom.css" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { registerUser, updateCompanyProfile, getCurrentUser, initDB } from "./static/js/db.js";
    import { renderDemoSwitcher } from "./static/js/switcher.js";

    // DB 초기화 및 퀵 스위처 렌더링
    initDB();
    renderDemoSwitcher();

    const firebaseConfig = {
      apiKey: "AIzaSyBpXt13oLYfr4SzA5EtYRcjddvZCRTuUSI",
      authDomain: "code-quest-4918e.firebaseapp.com",
      projectId: "code-quest-4918e",
      storageBucket: "code-quest-4918e.firebasestorage.app",
      messagingSenderId: "22281251552",
      appId: "1:22281251552:web:3cfb4d84d3313949243e85"
    };

    let auth;
    try {
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
    } catch (e) {
      console.warn("Firebase Auth 초기화 실패. 로컬 가상 Auth 모드로 가동합니다.");
    }

    window.handleCompanySignup = async function (event) {
      event.preventDefault();
      const companyName = document.getElementById('companyName').value.trim();
      const businessNumber = document.getElementById('businessNumber').value.trim();
      const country = document.getElementById('country').value;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      const signupBtn = document.getElementById('signupBtn');

      if (!country) {
        showMessage('기업 소재 국가를 선택해 주세요.', 'error');
        return;
      }

      if (password !== passwordConfirm) {
        showMessage('비밀번호가 일치하지 않습니다.', 'error');
        return;
      }

      signupBtn.disabled = true;

      // 1. Firebase Auth 회원가입 시도
      if (auth) {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          // 로컬 가상 DB 가입 및 프로필 초기화
          registerUser(email, password, 'company', companyName, businessNumber, country);
          updateCompanyProfile(email, { companyName });

          showMessage('기업 계정 생성이 완료되었습니다! 대시보드로 이동합니다.', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard_company.html';
          }, 1500);
          return;
        } catch (error) {
          console.warn("Firebase Auth 기업가입 실패. 가상 로컬 DB 생성을 시도합니다.", error.message);
        }
      }

      // 2. 가상 로컬 DB Fallback 기업가입
      try {
        registerUser(email, password, 'company', companyName, businessNumber, country);
        updateCompanyProfile(email, { companyName });
        showMessage('기업 가입 성공 (로컬 가상 모드)! 대시보드로 이동합니다.', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard_company.html';
        }, 1500);
      } catch (error) {
        signupBtn.disabled = false;
        showMessage(`오류: ${error.message}`, 'error');
      }
    };

    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    }

    window.addEventListener('load', () => {
      const user = getCurrentUser();
      if (user) {
        if (user.role === 'company') {
          window.location.href = 'dashboard_company.html';
        } else {
          window.location.href = 'marketplace.html';
        }
      }
    });
  </script>
</body>

</html>
