<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - HERMA-X</title>
  <!-- 부트스트랩 CSS 추가 (스타일 통일) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    body {
      background-color: #f8f9fa;
      /* 부트스트랩 기본 라이트 톤 배경 */
    }

    /* 내비게이션 바 로고 전용 스타일 (회원가입 페이지와 완벽 통일) */
    .navbar-logo {
      max-height: 32px;
      /* 내비게이션 바 높이에 맞춘 최적의 밸런스 */
      width: auto;
      object-fit: contain;
    }

    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 40px;
      background-color: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .auth-container h1 {
      text-align: center;
      color: #0d6efd;
      /* 부트스트랩 Primary 컬러 */
      margin-top: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #495057;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background-color: #ffffff;
      color: #212529;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .form-group input::placeholder {
      color: #adb5bd;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background-color: #0d6efd;
      /* 부트스트랩 Primary 버튼 색상 */
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    .btn-login:hover {
      background-color: #0b5ed7;
    }

    .btn-login:active {
      background-color: #0a58ca;
    }

    .btn-login:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      display: none;
      word-wrap: break-word;
    }

    .message.error {
      background-color: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
      display: block;
    }

    .message.success {
      background-color: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
      display: block;
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      color: #495057;
      font-size: 14px;
    }

    .auth-link .dropdown-toggle {
      color: #0d6efd;
      text-decoration: none;
      margin-left: 5px;
      font-weight: 500;
      border: none;
      background: none;
      padding: 0;
    }

    .auth-link .dropdown-toggle:hover {
      text-decoration: underline;
    }

    .info-box {
      background-color: #e7f1ff;
      border-left: 4px solid #0d6efd;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #0c4128;
    }

    .loading {
      display: none;
      text-align: center;
      color: #0d6efd;
      margin-top: 15px;
    }

    .spinner {
      border: 3px solid #ced4da;
      border-top: 3px solid #0d6efd;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- 상단 내비게이션 바 통일 (HERMA-X 로고 및 로그인 활성화 상태) -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="index.html">
        <img src="./static/assets/logo_gold_stamped.png" alt="HERMA-X Logo" class="navbar-logo"
          onerror="this.src='https://placehold.co/40x40/0d6efd/ffffff?text=H';">
        <span>HERMA-X</span>
      </a>

      <div class="d-flex align-items-center ms-auto gap-2">
        <!-- 현재 로그인 페이지이므로 로그인 버튼에 active 클래스 추가 -->
        <a class="btn btn-sm btn-outline-primary active" href="login.html">로그인</a>
        <div class="dropdown">
          <button class="btn btn-sm btn-primary dropdown-toggle fw-bold" type="button" data-bs-toggle="dropdown"
            aria-expanded="false">
            회원가입
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-menu-item dropdown-item" href="signup.html">개인 회원가입</a></li>
            <li><a class="dropdown-menu-item dropdown-item" href="signup_company.html">기업 회원가입</a></li>
          </ul>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">메인</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="dashboard_company.html">기업 대시보드</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <h1>로그인</h1>


    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="이메일을 입력하세요" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login" id="loginBtn">로그인</button>
    </form>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      로그인 중...
    </div>

    <div id="message" class="message"></div>

    <!-- 하단 링크 박스도 선택 드롭다운으로 구조 고도화 -->
    <div class="auth-link">
      계정이 없으신가요?
      <div class="dropdown d-inline-block">
        <button class="dropdown-toggle text-primary" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          회원가입 하기
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="signup.html">개인 가입</a></li>
          <li><a class="dropdown-item" href="signup_company.html">기업 가입</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 발표 시연용 계정 퀵 스위처 위젯 -->
  <div id="demoSwitcherContainer"></div>

  <!-- 부트스트랩 JS 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- 공통 테마 디자인용 스타일 파일 추가 -->
  <link href="./static/css/custom.css" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { loginUser, getCurrentUser, initDB } from "./static/js/db.js";
    import { renderDemoSwitcher } from "./static/js/switcher.js";

    // DB 초기화 및 퀵 스위처 렌더링
    initDB();
    renderDemoSwitcher();

    const firebaseConfig = {
      apiKey: "AIzaSyBpXt13oLYfr4SzA5EtYRcjddvZCRTuUSI",
      authDomain: "code-quest-4918e.firebaseapp.com",
      projectId: "code-quest-4918e",
      storageBucket: "code-quest-4918e.firebasestorage.app",
      messagingSenderId: "22281251552",
      appId: "1:22281251552:web:3cfb4d84d3313949243e85",
      measurementId: "G-94FKSPBZ2S"
    };

    let auth;
    try {
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
    } catch (e) {
      console.warn("Firebase Auth 초기화 실패. 로컬 가상 Auth 모드로 단독 구동합니다.");
    }

    window.handleLogin = async function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');
      const loginBtn = document.getElementById('loginBtn');
      const loadingEl = document.getElementById('loading');

      if (!email || !password) {
        showMessage('이메일과 비밀번호를 입력해주세요.', 'error');
        return;
      }

      loginBtn.disabled = true;
      loadingEl.style.display = 'block';

      // 1. Firebase Auth 시도
      if (auth) {
        try {
          const userCredential = await signInWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;

          // 로컬 DB 세션 동기화
          try {
            loginUser(email, password);
          } catch (dbErr) {
            // 회원 기록이 로컬 DB에 없을 경우 자동 연동 가입
            import("./static/js/db.js").then((mod) => {
              mod.registerUser(email, password, 'company', '신규 연동 기업', '000-00-00000');
            });
          }

          showMessage('Firebase 로그인 성공! 잠시만 기다려주세요...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard_company.html';
          }, 1000);
          return;
        } catch (error) {
          console.warn("Firebase Auth 실패. 가상 로컬 DB 검증으로 전환합니다.", error.message);
        }
      }

      // 2. Local 가상 DB Fallback 검증
      try {
        const user = loginUser(email, password);
        showMessage(`로그인 성공 (로컬 가상 모드)! 대시보드로 이동합니다...`, 'success');
        setTimeout(() => {
          if (user.role === 'company') {
            window.location.href = 'dashboard_company.html';
          } else {
            window.location.href = 'marketplace.html';
          }
        }, 1000);
      } catch (error) {
        loadingEl.style.display = 'none';
        loginBtn.disabled = false;
        showMessage(`로그인 실패: ${error.message}`, 'error');
        document.getElementById('password').value = '';
      }
    };

    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    }

    window.addEventListener('load', () => {
      const user = getCurrentUser();
      if (user) {
        if (user.role === 'company') {
          window.location.href = 'dashboard_company.html';
        } else {
          window.location.href = 'marketplace.html';
        }
      }
      document.getElementById('email').focus();
    });
  </script>
</body>

</html>
