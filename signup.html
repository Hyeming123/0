<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - HERMA-X</title>
  <!-- 부트스트랩 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    body {
      background-color: #f8f9fa;
    }

    /* 내비게이션 바 로고 전용 스타일 */
    .navbar-logo {
      max-height: 32px;
      /* 내비게이션 바 높이에 맞춘 최적의 밸런스 */
      width: auto;
      object-fit: contain;
    }

    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 40px;
      background-color: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .auth-container h1 {
      text-align: center;
      color: #0d6efd;
      margin-top: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #495057;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background-color: #ffffff;
      color: #212529;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .form-group input::placeholder {
      color: #adb5bd;
    }

    .form-group small {
      display: block;
      margin-top: 5px;
      color: #6c757d;
      font-size: 12px;
    }

    .btn-signup {
      width: 100%;
      padding: 12px;
      background-color: #0d6efd;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    .btn-signup:hover {
      background-color: #0b5ed7;
    }

    .btn-signup:active {
      background-color: #0a58ca;
    }

    .btn-signup:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      display: none;
      word-wrap: break-word;
    }

    .message.error {
      background-color: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
      display: block;
    }

    .message.success {
      background-color: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
      display: block;
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      color: #495057;
      font-size: 14px;
    }

    .auth-link a {
      color: #0d6efd;
      text-decoration: none;
      margin-left: 5px;
      font-weight: 500;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    .info-box {
      background-color: #e7f1ff;
      border-left: 4px solid #0d6efd;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #0c4128;
    }

    .loading {
      display: none;
      text-align: center;
      color: #0d6efd;
      margin-top: 15px;
    }

    .spinner {
      border: 3px solid #ced4da;
      border-top: 3px solid #0d6efd;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .debug-info {
      background-color: #212529;
      border: 1px solid #343a40;
      padding: 10px;
      border-radius: 4px;
      margin-top: 15px;
      font-size: 11px;
      color: #adb5bd;
      max-height: 100px;
      overflow-y: auto;
      display: none;
    }
  </style>
</head>

<body>

  <!-- 상단 내비게이션 바 (HERMA-X 로고 및 텍스트 적용) -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <!-- 준비하신 이미지 경로를 src에 매칭하세요 -->
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="index.html">
        <img src="./static/assets/logo_gold_stamped.png" alt="HERMA-X Logo" class="navbar-logo"
          onerror="this.src='https://placehold.co/40x40/0d6efd/ffffff?text=H';">
        <span>HERMA-X</span>
      </a>
      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="index.html">메인</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="app.html">마켓플레이스</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="dashboard_company.html">기업 대시보드</a>
        </li>
        <a class="btn btn-sm btn-outline-primary" href="login.html">로그인</a>
        <div class="dropdown">
          <button class="btn btn-sm btn-primary dropdown-toggle fw-bold" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            회원가입
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="signup.html">개인 회원가입</a></li>
            <li><a class="dropdown-item" href="signup_company.html">기업 회원가입</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>


  <div class="auth-container">
    <h1>회원가입</h1>
    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="example@example.com" required autocomplete="email">
        <small>유효한 이메일 주소를 입력해주세요.</small>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="최소 6자 이상" required minlength="6" autocomplete="new-password">
        <small>최소 6자 이상</small>
      </div>

      <div class="form-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" required minlength="6"
          autocomplete="new-password">
      </div>

      <button type="submit" class="btn-signup" id="signupBtn">회원가입</button>
    </form>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      회원가입 중...
    </div>

    <div id="message" class="message"></div>
    <div id="debugInfo" class="debug-info"></div>

    <div class="auth-link">
      이미 계정이 있으신가요?
      <a href="login.html">로그인</a>
    </div>
  </div>

  <!-- 발표 시연용 계정 퀵 스위처 위젯 -->
  <div id="demoSwitcherContainer"></div>

  <!-- 부트스트랩 JS 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- 공통 테마 디자인용 스타일 파일 추가 -->
  <link href="./static/css/custom.css" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { registerUser, getCurrentUser, initDB } from "./static/js/db.js";
    import { renderDemoSwitcher } from "./static/js/switcher.js";

    // DB 초기화 및 퀵 스위처 렌더링
    initDB();
    renderDemoSwitcher();

    const firebaseConfig = {
      apiKey: "AIzaSyBpXt13oLYfr4SzA5EtYRcjddvZCRTuUSI",
      authDomain: "code-quest-4918e.firebaseapp.com",
      projectId: "code-quest-4918e",
      storageBucket: "code-quest-4918e.firebasestorage.app",
      messagingSenderId: "22281251552",
      appId: "1:22281251552:web:3cfb4d84d3313949243e85",
      measurementId: "G-94FKSPBZ2S"
    };

    let auth;
    try {
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      setPersistence(auth, browserLocalPersistence).catch((error) => {
        console.error('Persistence 설정 오류:', error);
      });
    } catch (error) {
      console.warn("Firebase Auth 초기화 실패. 로컬 가상 Auth 모드로 가동합니다.");
    }

    window.handleSignup = async function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      const messageEl = document.getElementById('message');
      const signupBtn = document.getElementById('signupBtn');
      const loadingEl = document.getElementById('loading');

      if (!email || !password || !passwordConfirm) {
        showMessage('모든 필드를 입력해주세요.', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('비밀번호는 최소 6자 이상이어야 합니다.', 'error');
        return;
      }

      if (password !== passwordConfirm) {
        showMessage('비밀번호가 일치하지 않습니다.', 'error');
        document.getElementById('password').value = '';
        document.getElementById('passwordConfirm').value = '';
        return;
      }

      signupBtn.disabled = true;
      loadingEl.style.display = 'block';

      // 1. Firebase Auth 회원가입 시도
      if (auth) {
        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          // 로컬 가상 DB에도 등록
          registerUser(email, password, 'buyer', '글로벌 바이어'); // 일반 회원가입은 바이어로 가입 처리

          showMessage('Firebase 회원가입 성공! 로그인 페이지로 이동합니다...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
          return;
        } catch (error) {
          console.warn("Firebase Auth 회원가입 실패. 가상 로컬 DB 생성을 시도합니다.", error.message);
        }
      }

      // 2. 가상 로컬 DB Fallback 회원가입
      try {
        registerUser(email, password, 'buyer', '글로벌 바이어');
        showMessage('회원가입 성공 (로컬 가상 모드)! 마켓플레이스로 이동합니다...', 'success');
        setTimeout(() => {
          window.location.href = 'marketplace.html';
        }, 1500);
      } catch (error) {
        loadingEl.style.display = 'none';
        signupBtn.disabled = false;
        showMessage(`회원가입 실패: ${error.message}`, 'error');
      }
    };

    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    }

    window.addEventListener('load', () => {
      const user = getCurrentUser();
      if (user) {
        if (user.role === 'company') {
          window.location.href = 'dashboard_company.html';
        } else {
          window.location.href = 'marketplace.html';
        }
      }
      document.getElementById('email').focus();
    });
  </script>
</body>
